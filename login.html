<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoPulse — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="preconnect" href="https://cryptopulse-backend-ht7y.onrender.com">
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/premium.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
<style>
body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; position: relative; }

#bg-canvas { position: fixed; inset: 0; z-index: 0; width: 100%; height: 100%; }

.scene-fade {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 50% 45%, transparent 0%, var(--bg) 78%);
}

.auth-card {
  position: relative; z-index: 10;
  width: 380px; max-width: calc(100vw - 2.5rem);
  background: rgba(10,10,10,0.72);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 3rem 2.5rem;
}

.brand { text-align: center; margin-bottom: 2.5rem; }
.brand-logo {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px;
  background: var(--primary); color: #000;
  font-family: var(--font-heading); font-weight: 900;
  border-radius: var(--radius);
  margin-bottom: 1.25rem;
  box-shadow: 0 0 40px rgba(0,240,255,0.45);
  font-size: 1.05rem;
}
.brand-name { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 700; letter-spacing: 0.06em; display: block; }
.brand-name span { color: var(--primary); }
.brand-sub { font-size: 0.78rem; color: var(--fg-muted); margin-top: 0.4rem; letter-spacing: 0.03em; }

.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
.auth-tab { flex: 1; text-align: center; padding: 0.75rem; font-size: 0.74rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; color: var(--fg-muted); border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
.auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

.form-group { margin-bottom: 1.25rem; }
.form-group .input-label { display: block; margin-bottom: 0.5rem; }
.error-msg { font-size: 0.78rem; color: var(--danger); margin-top: 0.4rem; }
.form-footer { margin-top: 2rem; }

.divider { display: flex; align-items: center; gap: 0.875rem; margin: 1.75rem 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.divider span { font-size: 0.68rem; color: var(--fg-muted); letter-spacing: 0.1em; text-transform: uppercase; }

.demo-card { background: rgba(26,26,26,0.6); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; }
.demo-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--primary); margin-bottom: 0.6rem; }
.demo-cred { font-family: var(--font-mono); font-size: 0.78rem; color: var(--fg-muted); line-height: 1.9; }

.live-strip { position: relative; z-index: 10; margin-top: 1.75rem; text-align: center; font-family: var(--font-mono); font-size: 0.74rem; color: var(--fg-muted); }
.live-strip span { color: var(--primary); font-weight: 600; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scene-fade"></div>

<div>
  <div style="text-align:center;margin-bottom:1.25rem;position:relative;z-index:10">
    <a href="index.html" style="font-size:0.78rem;color:var(--fg-muted);display:inline-flex;align-items:center;gap:0.4rem;transition:color 0.2s" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--fg-muted)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to home
    </a>
  </div>
  <div class="auth-card fade-in">
    <div class="brand">
      <div class="brand-logo">CP</div>
      <span class="brand-name">CRYPTO<span>PULSE</span></span>
      <div class="brand-sub">Real-time crypto intelligence</div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="showTab('login')">Sign In</div>
      <div class="auth-tab" id="tab-register" onclick="showTab('register')">Create Account</div>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="input-label">Email</label>
        <input type="email" class="input" id="login-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="input-label">Password</label>
        <input type="password" class="input" id="login-password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">Sign In</button>
      </div>
    </form>

    <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label class="input-label">Full Name</label>
        <input type="text" class="input" id="reg-name" placeholder="Satoshi Nakamoto" maxlength="60" required>
      </div>
      <div class="form-group">
        <label class="input-label">Email</label>
        <input type="email" class="input" id="reg-email" placeholder="you@example.com" maxlength="120" required>
      </div>
      <div class="form-group">
        <label class="input-label">Password</label>
        <input type="password" class="input" id="reg-password" placeholder="••••••••" minlength="6" maxlength="128" required>
      </div>
      <div id="reg-error" class="error-msg" style="display:none"></div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary w-full btn-lg" id="reg-btn">Create Account</button>
      </div>
    </form>

    <div class="divider"><span>or try demo</span></div>
    <div class="demo-card">
      <div class="demo-title">Demo account</div>
      <div class="demo-cred">demo@cryptopulse.app<br>demo1234</div>
    </div>
  </div>

  <div class="live-strip">BTC <span id="btc-price">—</span> · ETH <span id="eth-price">—</span></div>
</div>

<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
<script>
  // Point the API client at the deployed backend (update this URL after you
  // deploy to Render/Railway). During local dev, leave it as localhost:4000.
</script>
<script src="assets/api-client.js"></script>
<script src="assets/scene3d.js"></script>
<script src="assets/premium.js"></script>
<script>
  (async function() {
    // If a valid session cookie exists already, restore it silently and redirect
    const restored = await CP.auth.tryRestoreSession();
    if (restored) window.location.href = 'dashboard.html';
  })();

  function showTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    btn.textContent = 'Signing in…'; btn.disabled = true;
    errEl.style.display = 'none';
    try {
      await CP.auth.login(document.getElementById('login-email').value, document.getElementById('login-password').value);
      window.location.href = 'dashboard.html';
    } catch(err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.textContent = 'Sign In'; btn.disabled = false;
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const errEl = document.getElementById('reg-error');
    const btn = document.getElementById('reg-btn');
    btn.textContent = 'Creating…'; btn.disabled = true;
    errEl.style.display = 'none';
    try {
      await CP.auth.register(document.getElementById('reg-name').value, document.getElementById('reg-email').value, document.getElementById('reg-password').value);
      window.location.href = 'dashboard.html';
    } catch(err) {
      errEl.textContent = err.message; errEl.style.display = 'block';
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
  }

  // 3D particle network background
  window.addEventListener('load', () => {
    const canvas = document.getElementById('bg-canvas');
    if (canvas) CP3D.particleNetwork(canvas);
  });

  // Live prices
  (async function() {
    try {
      const coins = await CP.api.getTopCoins(2);
      if (coins[0]) document.getElementById('btc-price').textContent = CP.fmt.price(coins[0].current_price);
      if (coins[1]) document.getElementById('eth-price').textContent = CP.fmt.price(coins[1].current_price);
    } catch(e) {}
  })();
</script>
<script>
// Wake Render backend the moment login page opens
try { fetch('https://cryptopulse-backend-ht7y.onrender.com/health',{method:'GET',mode:'no-cors',cache:'no-store'}).catch(function(){}); } catch(e) {}
</script>
</body>
</html>
