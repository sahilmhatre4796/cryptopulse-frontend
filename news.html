<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News — CryptoPulse</title>
<link rel="stylesheet" href="assets/styles.css">
<link rel="stylesheet" href="assets/premium.css">
<style>
.news-layout { display:grid; grid-template-columns:1fr 300px; gap:1.5rem; }
.news-grid { display:flex; flex-direction:column; gap:0; }
.news-card {
  display:grid; grid-template-columns:auto 1fr;
  gap:1rem; padding:1.25rem 0;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}
.news-card:hover .news-card-title { color:var(--primary); }
.news-card:last-child { border-bottom:none; }
.news-card-num { font-family:var(--font-mono); font-size:1.5rem; font-weight:900; color:rgba(255,255,255,0.06); width:40px; text-align:center; }
.news-card-content { min-width:0; }
.news-card-source { font-size:0.65rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--primary); margin-bottom:0.3rem; display:flex; align-items:center; gap:0.5rem; }
.news-card-title { font-size:1rem; font-weight:700; line-height:1.4; margin-bottom:0.5rem; transition:color 0.15s; }
.news-card-body { font-size:0.82rem; color:var(--fg-muted); line-height:1.6; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; margin-bottom:0.5rem; }
.news-card-meta { display:flex; gap:1rem; font-size:0.68rem; color:var(--fg-muted); }
.news-tags { display:flex; flex-wrap:wrap; gap:0.35rem; margin-top:0.5rem; }
.news-tag { font-size:0.62rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; background:var(--bg-muted); color:var(--fg-muted); padding:0.15rem 0.5rem; border-radius:var(--radius); border:1px solid var(--border); }
.sidebar-news { display:flex; flex-direction:column; gap:0.75rem; }
.trending-news { padding:0.75rem 0; border-bottom:1px solid var(--border); }
.trending-news:last-child { border-bottom:none; }
.trending-title { font-size:0.8rem; font-weight:600; line-height:1.4; cursor:pointer; transition:color 0.15s; }
.trending-title:hover { color:var(--primary); }
.category-bar { display:flex; gap:0.4rem; flex-wrap:wrap; margin-bottom:1.5rem; }
.cat-tag { font-size:0.65rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; padding:0.3rem 0.75rem; border-radius:var(--radius); border:1px solid var(--border); color:var(--fg-muted); cursor:pointer; transition:all 0.15s; background:transparent; }
.cat-tag:hover { color:var(--fg); border-color:rgba(255,255,255,0.2); }
.cat-tag.active { background:var(--primary-dim); color:var(--primary); border-color:var(--primary); }
@media(max-width:900px){ .news-layout{grid-template-columns:1fr;} .sidebar-right{display:none;} }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">

      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 style="font-size:1.3rem;margin-bottom:0.2rem">Crypto News</h2>
          <div class="label" id="news-count">Loading…</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="loadNews()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>

      <!-- Category filter -->
      <div class="category-bar" id="cat-bar">
        <button class="cat-tag active" data-cat="" onclick="setCategory(this, '')">All</button>
        <button class="cat-tag" data-cat="BTC" onclick="setCategory(this, 'BTC')">Bitcoin</button>
        <button class="cat-tag" data-cat="ETH" onclick="setCategory(this, 'ETH')">Ethereum</button>
        <button class="cat-tag" data-cat="Trading" onclick="setCategory(this, 'Trading')">Trading</button>
        <button class="cat-tag" data-cat="Technology" onclick="setCategory(this, 'Technology')">Technology</button>
        <button class="cat-tag" data-cat="Regulation" onclick="setCategory(this, 'Regulation')">Regulation</button>
        <button class="cat-tag" data-cat="DeFi" onclick="setCategory(this, 'DeFi')">DeFi</button>
        <button class="cat-tag" data-cat="NFT" onclick="setCategory(this, 'NFT')">NFT</button>
      </div>

      <div class="news-layout">
        <!-- Main news feed -->
        <div class="card" style="padding:0 1.25rem">
          <div id="news-feed">
            <div class="news-card"><div class="news-card-num">&nbsp;</div><div class="news-card-content"><div class="skeleton" style="height:0.65rem;width:80px;margin-bottom:0.5rem"></div><div class="skeleton" style="height:1rem;width:95%;margin-bottom:0.35rem"></div><div class="skeleton" style="height:1rem;width:80%;margin-bottom:0.5rem"></div><div class="skeleton" style="height:0.65rem;width:50%"></div></div></div>
            <div class="news-card"><div class="news-card-num">&nbsp;</div><div class="news-card-content"><div class="skeleton" style="height:0.65rem;width:70px;margin-bottom:0.5rem"></div><div class="skeleton" style="height:1rem;width:90%;margin-bottom:0.35rem"></div><div class="skeleton" style="height:1rem;width:75%;margin-bottom:0.5rem"></div><div class="skeleton" style="height:0.65rem;width:45%"></div></div></div>
            <div class="news-card"><div class="news-card-num">&nbsp;</div><div class="news-card-content"><div class="skeleton" style="height:0.65rem;width:90px;margin-bottom:0.5rem"></div><div class="skeleton" style="height:1rem;width:85%;margin-bottom:0.35rem"></div><div class="skeleton" style="height:1rem;width:70%;margin-bottom:0.5rem"></div><div class="skeleton" style="height:0.65rem;width:55%"></div></div></div>
            <div class="news-card"><div class="news-card-num">&nbsp;</div><div class="news-card-content"><div class="skeleton" style="height:0.65rem;width:75px;margin-bottom:0.5rem"></div><div class="skeleton" style="height:1rem;width:92%;margin-bottom:0.35rem"></div><div class="skeleton" style="height:1rem;width:78%;margin-bottom:0.5rem"></div><div class="skeleton" style="height:0.65rem;width:40%"></div></div></div>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar-right">
          <div class="card mb-4">
            <div class="card-header"><span class="card-title">Top Stories</span></div>
            <div class="sidebar-news" id="top-stories">
              <div class="trending-news"><div class="skeleton" style="height:0.8rem;width:95%;margin-bottom:4px"></div><div class="skeleton" style="height:0.65rem;width:60%"></div></div>
              <div class="trending-news"><div class="skeleton" style="height:0.8rem;width:85%;margin-bottom:4px"></div><div class="skeleton" style="height:0.65rem;width:50%"></div></div>
              <div class="trending-news"><div class="skeleton" style="height:0.8rem;width:90%;margin-bottom:4px"></div><div class="skeleton" style="height:0.65rem;width:65%"></div></div>
            </div>
          </div>

          <div class="card">
            <div class="card-header"><span class="card-title">Market Movers</span></div>
            <div id="market-movers">
              <div style="padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem"><div class="skeleton" style="width:24px;height:24px;border-radius:50%"></div><div style="flex:1"><div class="skeleton" style="height:0.75rem;width:80%;margin-bottom:3px"></div></div><div class="skeleton" style="height:0.65rem;width:50px"></div></div>
              <div style="padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem"><div class="skeleton" style="width:24px;height:24px;border-radius:50%"></div><div style="flex:1"><div class="skeleton" style="height:0.75rem;width:70%;margin-bottom:3px"></div></div><div class="skeleton" style="height:0.65rem;width:50px"></div></div>
              <div style="padding:0.5rem 0;display:flex;align-items:center;gap:0.75rem"><div class="skeleton" style="width:24px;height:24px;border-radius:50%"></div><div style="flex:1"><div class="skeleton" style="height:0.75rem;width:85%;margin-bottom:3px"></div></div><div class="skeleton" style="height:0.65rem;width:50px"></div></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
<script src="assets/api-client.js"></script>
<script src="assets/premium.js"></script>
<script>
CP.auth.requireAuth();
CP.nav.initSidebar('news');
CP.nav.initTopbar('News');

let allArticles = [];
let currentCat = '';

async function loadNews() {
  try {
    const d = await CP.api.getNews();
    allArticles = d?.Data || [];
    document.getElementById('news-count').textContent = `${allArticles.length} articles available`;
    renderFeed();
    renderTopStories();
  } catch(e) {
    document.getElementById('news-feed').innerHTML = `<div style="padding:3rem;text-align:center;color:var(--fg-muted)"><div style="font-size:2rem;margin-bottom:1rem">📡</div><div>Unable to load news.<br>Please check your connection.</div></div>`;
  }
}

function setCategory(btn, cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function renderFeed() {
  let articles = allArticles;
  if (currentCat) articles = articles.filter(a => (a.categories || '').toLowerCase().includes(currentCat.toLowerCase()) || (a.tags || '').toLowerCase().includes(currentCat.toLowerCase()));
  const feed = document.getElementById('news-feed');
  if (!articles.length) {
    feed.innerHTML = `<div style="padding:3rem;text-align:center;color:var(--fg-muted)"><div style="font-size:2rem;margin-bottom:1rem">🔍</div><div>No articles found for this category.</div><button class="btn btn-outline btn-sm" style="margin-top:1rem" onclick="document.querySelector('[data-cat=\\'\\']').click()">Show All</button></div>`;
    return;
  }
  document.getElementById('news-count').textContent = `${articles.length} of ${allArticles.length} articles`;
  feed.innerHTML = articles.slice(0, 30).map((a, i) => {
    const cats = (a.categories || '').split('|').filter(Boolean).slice(0, 3);
    return `
      <div class="news-card" data-article-url="${CP.escapeHtml(CP.safeUrl(a.url))}">
        <div class="news-card-num">${String(i + 1).padStart(2, '0')}</div>
        <div class="news-card-content">
          <div class="news-card-source">
            ${CP.escapeHtml(a.source_info?.name || a.source || '—')}
            <span style="color:var(--fg-muted);font-weight:400">·</span>
            <span style="color:var(--fg-muted);font-weight:400">${CP.fmt.ago(a.published_on)}</span>
          </div>
          <div class="news-card-title">${CP.escapeHtml(a.title)}</div>
          <div class="news-card-body">${CP.escapeHtml(a.body?.slice(0, 200) || '')}</div>
          <div class="news-tags">
            ${cats.map(c => `<span class="news-tag">${CP.escapeHtml(c.trim())}</span>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('');
  document.querySelectorAll('.news-card[data-article-url]').forEach(card => {
    card.addEventListener('click', () => {
      const url = card.dataset.articleUrl;
      if (url && url !== '#') window.open(url, '_blank', 'noopener,noreferrer');
    });
  });
  setTimeout(() => { Premium.initTilt('.card'); Premium.initMagnetic(); }, 100);
}

function renderTopStories() {
  const top = document.getElementById('top-stories');
  top.innerHTML = allArticles.slice(0, 8).map(a => `
    <div class="trending-news">
      <div class="news-card-source" style="margin-bottom:0.25rem">${CP.escapeHtml(a.source_info?.name || a.source || '—')} · ${CP.fmt.ago(a.published_on)}</div>
      <div class="trending-title" data-article-url="${CP.escapeHtml(CP.safeUrl(a.url))}">${CP.escapeHtml(a.title)}</div>
    </div>`).join('');
  document.querySelectorAll('.trending-title[data-article-url]').forEach(el => {
    el.addEventListener('click', () => {
      const url = el.dataset.articleUrl;
      if (url && url !== '#') window.open(url, '_blank', 'noopener,noreferrer');
    });
  });
}

async function loadMarketMovers() {
  try {
    const coins = await CP.api.getTopCoins(10);
    const sorted = [...coins].sort((a, b) => Math.abs(b.price_change_percentage_24h) - Math.abs(a.price_change_percentage_24h));
    document.getElementById('market-movers').innerHTML = sorted.slice(0, 5).map(c => {
      const up = c.price_change_percentage_24h >= 0;
      return `
        <div style="padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.75rem">
          <div class="coin-icon" style="width:24px;height:24px;font-size:0.5rem;background:${CP.getCoinColor(c.id)}22;color:${CP.getCoinColor(c.id)}">${c.symbol.toUpperCase().slice(0,3)}</div>
          <div style="flex:1"><div style="font-size:0.82rem;font-weight:600">${c.symbol.toUpperCase()}</div></div>
          <div style="font-family:var(--font-mono);font-size:0.72rem;font-weight:700;color:${up ? 'var(--secondary)' : 'var(--danger)'}">${CP.fmt.pct(c.price_change_percentage_24h)}</div>
        </div>`;
    }).join('');
  } catch(e) {}
}

loadNews();
loadMarketMovers();
setInterval(loadNews, 300000);
</script>
</body>
</html>
